  web_server:
    build:
      context: ./web/server
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: courtside_web_server
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web_client:
    build:
      context: ./web/client
      dockerfile: Dockerfile
    container_name: courtside_web_client
    ports:
      - "80:80"
    depends_on:
      web_server:
        condition: service_healthy
    restart: unless-stopped

secrets:
  api_key:
    file: ./.secrets/api_key.txt
