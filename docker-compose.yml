services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - ./infrastructure/redis/data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Started with COMPOSE_PROFILES=postgres (see .env.example). Setting
  # DATABASE_URL switches the web server and every agent from SQLite to this.
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: courtside
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-courtside}
      POSTGRES_DB: courtside
    volumes:
      - ./infrastructure/postgres/data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtside -d courtside"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent_0_historical_etl:
    build:
      context: .
      dockerfile: agents/0_historical_etl/Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  agent_1_market_scraper:
    build:
      context: .
      dockerfile: agents/1_market_scraper/Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  agent_2_news_sentinel:
