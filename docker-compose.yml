services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - ./infrastructure/redis/data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent_0_historical_etl:
    build:
      context: .
      dockerfile: agents/0_historical_etl/Dockerfile
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  agent_1_market_scraper:
    build:
      context: .
      dockerfile: agents/1_market_scraper/Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  agent_2_news_sentinel:
    build:
      context: .
      dockerfile: agents/2_news_sentinel/Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  agent_9_news_sentiment:
    build:
      context: .
      dockerfile: agents/9_news_sentiment/Dockerfile
