      context: .
      dockerfile: agents/3_projection_engine/Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"

  agent_10_game_total_projector:
