name: CourtSideEdge CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/client/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/server/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test
