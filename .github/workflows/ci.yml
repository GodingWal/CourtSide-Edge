name: CourtSideEdge CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/client/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m compileall agents shared infrastructure
      - run: ruff check agents shared infrastructure
      # Golden regression suite: every observed pick-pipeline production
      # failure is a permanent fixture; this gate blocks pipeline PRs.
      - run: python -m pytest agents/test_golden_regressions.py -v
      - run: python -m pytest
  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/server/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test
