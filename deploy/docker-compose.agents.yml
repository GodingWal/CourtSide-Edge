  agent_8_bankroll_sizer:
    <<: *agent
    build: { context: .., dockerfile: agents/8_bankroll_sizer/Dockerfile }

  agent_4_execution_oracle:
    <<: *agent
    build: { context: .., dockerfile: agents/4_execution_oracle/Dockerfile }
    ports: ["127.0.0.1:8001:8001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  agent_17_velocity_agent:
