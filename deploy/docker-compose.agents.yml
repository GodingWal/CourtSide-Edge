# CourtSideEdge — AGENT tier (runs on the vast.ai box: 151.237.25.234)
#
# These are the stateless / compute agents. They do NOT run their own Redis or
# touch the SQLite ledger; they connect back to the VPS over the network:
#   REDIS_HOST   = <VPS IP>   (set in deploy/env/agents.env)
#   REDIS_PASSWORD = <shared secret, matches the VPS>
#   BACKEND_URL  = https://courtside-edge.com
#
# The ledger-coupled agents (0, 13, 14, 15, 16, 20) live in the web tier on the
# VPS because they read/write the SQLite file directly.
#
# Usage (from repo root, on the vast.ai box):
#   docker compose --env-file deploy/env/agents.env -f deploy/docker-compose.agents.yml up -d --build
#
# Health-check FastAPI ports are bound to loopback so you can inspect them
# through the SSH tunnel (ssh -p 26918 root@151.237.25.234 -L 8080:localhost:8080).

x-agent: &agent
  env_file: [env/agents.env]
  restart: unless-stopped

# Agents that call the host's local LLM (Ollama) need host.docker.internal.
x-llm-agent: &llm-agent
  env_file: [env/agents.env]
  restart: unless-stopped
  extra_hosts: ["host.docker.internal:host-gateway"]

services:
  agent_12_alpha_sandbox:
    <<: *llm-agent
    build: { context: .., dockerfile: agents/12_alpha_sandbox/Dockerfile }

  agent_1_market_scraper:
    <<: *agent
    build: { context: .., dockerfile: agents/1_market_scraper/Dockerfile }

  agent_2_news_sentinel:
    <<: *llm-agent
    build: { context: .., dockerfile: agents/2_news_sentinel/Dockerfile }

  agent_9_news_sentiment:
    <<: *llm-agent
    build: { context: .., dockerfile: agents/9_news_sentiment/Dockerfile }

  agent_3_projection_engine:
    <<: *agent
    build: { context: .., dockerfile: agents/3_projection_engine/Dockerfile }
    ports: ["127.0.0.1:8000:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  agent_10_game_total_projector:
    <<: *agent
    build: { context: .., dockerfile: agents/10_game_total_projector/Dockerfile }

  agent_11_market_value_detector:
    <<: *agent
    build: { context: .., dockerfile: agents/11_market_value_detector/Dockerfile }

  agent_5_referee_engine:
    <<: *agent
    build: { context: .., dockerfile: agents/5_referee_engine/Dockerfile }

  agent_6_steam_detector:
    <<: *agent
    build: { context: .., dockerfile: agents/6_steam_detector/Dockerfile }

  agent_2_5_game_flow_oracle:
    <<: *agent
    build: { context: .., dockerfile: agents/2.5_game_flow_oracle/Dockerfile }

  agent_7_correlation_guard:
    <<: *agent
